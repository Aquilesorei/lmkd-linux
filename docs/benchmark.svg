<svg width="900" height="470" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="900" height="470" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Main title -->
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">
    mgd benchmark · PSI memory stall · i7-13700H · 16 GB UMA · Fedora 44
  </text>

  <!-- ═══════════════ LEFT CHART: Lapce clean-room ═══════════════ -->
  <text x="228" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Lapce cold build (368 crates)</text>
  <text x="228" y="67" text-anchor="middle" font-size="11" fill="#64748b">12 GB free · clean-room · worst case for mgd</text>
  <text x="228" y="82" text-anchor="middle" font-size="11" fill="#64748b">PSI stall · lower is better · −66% with mgd</text>

  <!-- Y-axis label -->
  <text x="40" y="195" text-anchor="middle" font-size="10" fill="#94a3b8" transform="rotate(-90,40,195)">stall ms</text>

  <!-- Gridlines: baseline y=300, max=200ms, scale=1.0 px/ms -->
  <line x1="68" y1="250" x2="400" y2="250" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="68" y1="200" x2="400" y2="200" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="68" y1="150" x2="400" y2="150" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="68" y1="100" x2="400" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y-axis tick labels -->
  <text x="62" y="254" text-anchor="end" font-size="10" fill="#94a3b8">50</text>
  <text x="62" y="204" text-anchor="end" font-size="10" fill="#94a3b8">100</text>
  <text x="62" y="154" text-anchor="end" font-size="10" fill="#94a3b8">150</text>
  <text x="62" y="104" text-anchor="end" font-size="10" fill="#94a3b8">200</text>

  <!-- Baseline -->
  <line x1="68" y1="300" x2="400" y2="300" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Bar A: No mgd — 185ms → h=185, top=115 -->
  <rect x="102" y="115" width="65" height="185" fill="#94a3b8" rx="3"/>
  <text x="134" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">185</text>
  <text x="134" y="316" text-anchor="middle" font-size="11" fill="#475569">No mgd</text>
  <text x="134" y="329" text-anchor="middle" font-size="10" fill="#94a3b8">123 s</text>

  <!-- Bar B: Reactive — 63ms → h=63, top=237 -->
  <rect x="193" y="237" width="65" height="63" fill="#60a5fa" rx="3"/>
  <text x="225" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">63</text>
  <text x="225" y="316" text-anchor="middle" font-size="11" fill="#475569">Reactive</text>
  <text x="225" y="329" text-anchor="middle" font-size="10" fill="#94a3b8">138 s</text>

  <!-- Bar C: +Spike — 78ms → h=78, top=222 -->
  <rect x="284" y="222" width="65" height="78" fill="#4ade80" rx="3"/>
  <text x="316" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">78</text>
  <text x="316" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">+ Spike</text>
  <text x="316" y="329" text-anchor="middle" font-size="10" fill="#94a3b8">139 s</text>

  <!-- ═══════════════ DIVIDER ═══════════════ -->
  <line x1="450" y1="44" x2="450" y2="338" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ═══════════════ RIGHT CHART: Docker real-world ═══════════════ -->
  <text x="672" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Docker compose build (Next.js + Prisma)</text>
  <text x="672" y="67" text-anchor="middle" font-size="11" fill="#64748b">7.5 GB free · Firefox + KDE + IDE running</text>
  <text x="672" y="82" text-anchor="middle" font-size="11" fill="#16a34a">PSI stall −70% · mgd+spike build 20% faster</text>

  <!-- Y-axis label -->
  <text x="476" y="195" text-anchor="middle" font-size="10" fill="#94a3b8" transform="rotate(-90,476,195)">stall ms</text>

  <!-- Gridlines: baseline y=300, max=600ms, scale=200/600=0.333 px/ms -->
  <!-- 150ms→y=250, 300ms→y=200, 450ms→y=150, 600ms→y=100 -->
  <line x1="506" y1="250" x2="838" y2="250" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="506" y1="200" x2="838" y2="200" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="506" y1="150" x2="838" y2="150" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="506" y1="100" x2="838" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y-axis tick labels -->
  <text x="500" y="254" text-anchor="end" font-size="10" fill="#94a3b8">150</text>
  <text x="500" y="204" text-anchor="end" font-size="10" fill="#94a3b8">300</text>
  <text x="500" y="154" text-anchor="end" font-size="10" fill="#94a3b8">450</text>
  <text x="500" y="104" text-anchor="end" font-size="10" fill="#94a3b8">600</text>

  <!-- Baseline -->
  <line x1="506" y1="300" x2="838" y2="300" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Bar A: No mgd — 551ms → h=184, top=116 -->
  <rect x="538" y="116" width="65" height="184" fill="#94a3b8" rx="3"/>
  <text x="570" y="111" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">551</text>
  <text x="570" y="316" text-anchor="middle" font-size="11" fill="#475569">No mgd</text>
  <text x="570" y="329" text-anchor="middle" font-size="10" fill="#94a3b8">74 s</text>

  <!-- Bar B: Reactive — 196ms → h=65, top=235 -->
  <rect x="629" y="235" width="65" height="65" fill="#60a5fa" rx="3"/>
  <text x="661" y="230" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">196</text>
  <text x="661" y="316" text-anchor="middle" font-size="11" fill="#475569">Reactive</text>
  <text x="661" y="329" text-anchor="middle" font-size="10" fill="#94a3b8">69 s</text>

  <!-- Bar C: +Spike — 165ms → h=55, top=245 -->
  <rect x="720" y="245" width="65" height="55" fill="#4ade80" rx="3"/>
  <text x="752" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">165</text>
  <text x="752" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">+ Spike</text>
  <text x="752" y="329" text-anchor="middle" font-size="10" fill="#15803d">59 s ★</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="246" y="358" width="13" height="13" fill="#94a3b8" rx="2"/>
  <text x="264" y="370" font-size="12" fill="#334155">No mgd</text>

  <rect x="346" y="358" width="13" height="13" fill="#60a5fa" rx="2"/>
  <text x="364" y="370" font-size="12" fill="#334155">mgd reactive only</text>

  <rect x="502" y="358" width="13" height="13" fill="#4ade80" rx="2"/>
  <text x="520" y="370" font-size="12" fill="#334155">mgd + spike mode</text>

  <!-- ═══════════════ FOOTNOTES ═══════════════ -->
  <text x="450" y="400" text-anchor="middle" font-size="10" fill="#94a3b8">
    Left: clean-room · daemon overhead visible, nothing to manage · +12% build cost, −66% PSI stall
  </text>
  <text x="450" y="416" text-anchor="middle" font-size="10" fill="#64748b">
    Right: real-world load · mgd manages competing processes · −70% PSI stall, ★ build 20% faster
  </text>
  <text x="450" y="448" text-anchor="middle" font-size="10" fill="#cbd5e1">
    Fedora 44 · kernel 7.0 · zram 12 GB zstd · PSI stall = some_total accumulated during build
  </text>
</svg>
