# mgd — zram compact sysfs grant (opt-in, Fix 1)
#
# /sys/block/zram0/compact is mode 0200 root:root by default — the login user
# cannot write it. This grants group-write to the `mgd` group so the
# unprivileged daemon can trigger zram compaction with no helper binary and no
# capability. See docs/PRIVILEGE_DESIGN.md §1.
#
# Install:
#   sudo install -m 0644 packaging/mgd-zram.conf /etc/tmpfiles.d/mgd-zram.conf
#   sudo systemd-tmpfiles --create /etc/tmpfiles.d/mgd-zram.conf
#
# type  path                      mode uid  gid  age arg
z       /sys/block/zram0/compact  0220 root mgd  -   -
