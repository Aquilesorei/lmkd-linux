# mgd priority configuration
# Each [[apps]] entry is checked in order — first match wins.
# pattern: Rust regex matched against the process name (from /proc/pid/status)
# priority: 0–100, higher = kill sooner
#   0–19   CRITICAL  never touched (compositor, audio, session daemons)
#   20–39  HIGH      last resort only (active IDEs, databases, video calls)
#   40–59  NORMAL    standard desktop apps
#   60–79  LOW       background services, freeze/checkpoint early
#   80–100 EXPENDABLE kill first, no ceremony
#
# Per-app optional fields:
#   checkpoint = true   — always CRIU-checkpoint this process at Critical pressure
#   checkpoint = false  — never checkpoint, go straight to terminate/kill
#
# [[protect]] entries are NEVER touched regardless of pressure.
# Use for anything not in the priority=0–19 tier that you still want off-limits.

[defaults]
priority = 50
# Keep this many log files in ~/memlogs/ — oldest are deleted on startup.
# Set to 0 to disable rotation (keep all files forever).
log_keep = 10

# ── CRITICAL (10) ────────────────────────────────────────────────────────────
# Kernel threads (zero RSS — plan() skips them anyway, but classified for display)

[[apps]]
name    = "kernel-workers"
pattern = "^(kworker|ksoftirqd|migration|kswapd|oom_reaper|kthreadd|kcompactd|khugepaged|kauditd|watchdogd|rcu_)"
priority = 10

[[apps]]
name    = "mgd"
pattern = "^mgd$"
priority = 0

[[apps]]
name    = "irq-threads"
pattern = "^irq/"
priority = 10

[[apps]]
name    = "kernel-threads"
pattern = "^(jbd2/|btrfs-|jfs)"
priority = 10

[[apps]]
name    = "systemd-core"
pattern = "^(systemd|systemd-journald|systemd-journal|systemd-logind|systemd-udevd|systemd-resolve|systemd-hostnam|systemd-machine|systemd-userdbd|systemd-userwor|kthreadd)$"
priority = 10

